<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tour Editor | Creator Suite</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>360° Editor</h2>
                <p>Creator Studio v1.0</p>
            </div>

            <div class="section">
                <div class="section-title">
                    <span>КОМНАТЫ</span>
                    <button id="add-room-btn" class="icon-btn" title="Добавить комнату">+</button>
                </div>
                <div id="rooms-list" class="item-list">
                    <!-- Rooms go here -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="primary-btn" onclick="saveToFile()">💾 Сохранить тур</button>
                <div class="sidebar-footer-actions">
                    <button class="secondary-btn" onclick="loadTourFromFile()"
                        title="Загрузить tour-config.json для редактирования">📂 Загрузить</button>
                    <button class="secondary-btn" style="color: #ef4444;"
                        onclick="if(confirm('Сбросить черновик и начать заново?')){localStorage.removeItem('tourEditorDraft'); location.reload();}"
                        title="Сбросить черновик">↺ Сброс</button>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <div class="room-info">
                    <span id="current-room-name">Выберите или создайте комнату</span>
                </div>
                <div class="workspace-tools">
                </div>
            </header>

            <div id="viewer-container">
                <div id="panorama"></div>
                <!-- Overlay for "No room selected" -->
                <div id="empty-state" class="overlay-state">
                    <div class="state-card">
                        <div class="icon">🖼️</div>
                        <h3>Редактор готов</h3>
                        <p>Добавьте изображение по ссылке, чтобы начать разметку тура</p>
                        <button class="secondary-btn" onclick="document.getElementById('add-room-btn').click()">Добавить
                            первую комнату</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Inspector (Right) -->
        <aside class="inspector">
            <div class="inspector-header">
                <h3>Редактор</h3>
            </div>
            <div id="inspector-content" class="inspector-body">
                <p class="empty-hint">Выберите объект для редактирования</p>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 id="modal-title">Добавить комнату</h3>
            <div class="form-group">
                <label>Название комнаты</label>
                <input type="text" id="room-name-input" placeholder="Напр: Прихожая">
            </div>
            <div class="form-group">
                <label>Ссылка на 360° фото (URL)</label>
                <input type="text" id="room-url-input" placeholder="https://example.com/photo.jpg">
                <p class="field-hint">Используйте прямую ссылку на JPG/PNG файл панорамы</p>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="tertiary-btn">Отмена</button>
                <button id="modal-confirm" class="primary-btn">Добавить</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="editor.js"></script>
</body>

</html>
