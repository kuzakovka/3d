<!DOCTYPE html>
<html lang="ru">
<head>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

</head>
<body>
    <div id="panorama"></div>

    <script>

        var TOUR_CONFIG = {

    "scenes": {

};

        });

</body>
</html>
